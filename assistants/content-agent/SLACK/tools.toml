# content-agent — Slack surface tool configuration (design spec §6, §8).
#
# Declares the tools / APIs / MCPs content-agent is granted while on the [SLACK]
# surface. Per spec §7 (self-learning / hot-reconfigure), this file is DATA: an
# operator grants a new capability by editing it and resetting the agent (fresh
# session_id) so the daemon re-reads the profile on the next turn — no rebuild.
#
# v1 ordering (spec §6): content-lab HTTP API first, bash/fetch escape hatch for
# the rest, a content-pipeline MCP deferred. This is a DECLARATION the daemon's
# permission gate reads; it is not itself a live wiring of the tools.

[agent]
name = "content-agent"
surface = "SLACK"
# A reset = new session_id for this agent+thread; the daemon rebuilds the system
# prompt from this (possibly edited) profile on the next turn.
reset = "new-session"

# ---------------------------------------------------------------------------
# Built-in runtime tools the agent may call on Slack. The daemon is
# permission-gated; these are the ones content-agent is allowed.
# ---------------------------------------------------------------------------
[builtin]
# HTTP to the content-lab API + any escape-hatch fetches (Replicate/R2/gallery).
fetch = true
# Escape hatch for anything the API doesn't cover (drive workers/CLIs directly).
bash = true
# Slack message/canvas/file I/O is driven through couriers/transport/slack.py,
# invoked via bash; the agent never re-implements Slack calls.

# ---------------------------------------------------------------------------
# content-posting-lab HTTP API — the PRIMARY pipeline path (spec §6.1).
# Reachable at $CONTENT_LAB_API_URL, credentialed via $CONTENT_LAB_API_KEY
# (see content-agent.env.example). Endpoints are called over the `fetch` builtin.
# ---------------------------------------------------------------------------
[api.content_lab]
base_url_env = "CONTENT_LAB_API_URL"
api_key_env  = "CONTENT_LAB_API_KEY"

# Endpoints content-agent is allowed to call. append/read-only by default;
# no destructive (delete/repost) endpoints are granted in v1 (spec §9).
[[api.content_lab.endpoints]]
name    = "generate_video"
method  = "POST"
path    = "/api/video/generate"
summary = "Kick off a video generation from a prompt."
sop     = "sops/generate.md"

[[api.content_lab.endpoints]]
name    = "video_status"
method  = "GET"
path    = "/api/video/status/{job_id}"
summary = "Poll the status of a generation job."
sop     = "sops/status.md"

[[api.content_lab.endpoints]]
name    = "gallery_list"
method  = "GET"
path    = "/api/gallery"
summary = "List generated clips in the gallery (links + metadata)."
sop     = "sops/gallery.md"

[[api.content_lab.endpoints]]
name    = "queue_status"
method  = "GET"
path    = "/api/status"
summary = "Report pipeline / queue status."
sop     = "sops/status.md"

# ---------------------------------------------------------------------------
# Deferred: a typed content-pipeline MCP (spec §6.3). Not wired in v1 — listed
# here so the upgrade path is explicit. Enable by editing + reset, once it exists.
# ---------------------------------------------------------------------------
[mcp.content_pipeline]
enabled = false
note    = "Deferred per spec §6.3 — wrap generate/poll/review/upload/gallery-status as typed MCP tools once the surface stabilizes."
