# content-agent — assistant manifest (mirrors the courier.toml pattern).
#
# Where a courier.toml declares a deterministic/agentic courier + its slash
# commands, an assistant manifest declares a brain-in-the-loop specialist: its
# identity entry, its surfaces, and how a turn is scoped to it. The Slack inbound
# bridge (assistants/bridge/) reads this to know which dir to scope a turn to and
# which surface profile applies.

name = "content-agent"
class = "assistant"            # vs. "courier" — brain-in-the-loop, not outbound-only
description = "Conversational Slack assistant: generate video, chat/Q&A, gallery/status, canvas rendering — on Ocean rails."

# agentic = every turn is reasoned by the Ocean daemon (POST /v1/prompt) scoped to
# this dir; the daemon auto-loads CLAUDE.md/AGENTS.md via load_project_prompt.
mode = "agentic"

# Entry identity files the daemon ancestor-walk picks up when cwd is this dir.
entry = "CLAUDE.md"

# Surfaces this assistant is authored for. v1 = Slack only; other slots are the
# directory pattern, not live (spec §2 non-goals).
surfaces = ["SLACK"]

# --- Slack surface binding -------------------------------------------------
[surface.SLACK]
# Ocean OS client_type → surface map: surface-slack → [SLACK] (ocean-os surface_dir).
client_type = "surface-slack"
# cwd a turn is scoped to (relative to repo root) so the right identity loads.
cwd = "assistants/content-agent"
# Tools/APIs/MCPs granted on this surface.
tools = "SLACK/tools.toml"
# Surface profile composed for this agent (house base + agent overrides). The
# composer (tools/compose_profile.py) assembles _shared + _base/SLACK +
# content-agent/SLACK into the file the daemon loads. See assistants/README.md.
profile = "SLACK/system.md"

# Session-id convention binds a Slack session to (agent, channel/DM, thread) so
# threads stay isolated + resumable (spec §5). Bridge fills the placeholders.
session_key = "slack:content-agent:{channel_id}:{thread_ts|dm}"

# --- Pipeline access (spec §6) ---------------------------------------------
[pipeline]
# Primary path: the deployed content-posting-lab FastAPI backend.
api_url_env = "CONTENT_LAB_API_URL"
api_key_env = "CONTENT_LAB_API_KEY"
# MCP wrapper deferred (spec §6.3).
mcp = false
