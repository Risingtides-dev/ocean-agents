# Machine-readable build register for the ocean-agents side of the Agent
# Filesystem direction. The architecture doc may summarize this, but this file
# is the source of truth for package-side builds.

version = 1
repo = "ocean-agents"
runtime_repo = "ocean-os"
architecture_doc = "docs/AGENT_FILESYSTEM_ARCHITECTURE.md"
migration_doc = "docs/PYTHON_TO_RUST_MIGRATION.md"

# Reality check: ocean-agents currently has zero real primitive-native builds.
# What exists here today is filesystem content and Python parity harnesses. The
# typed primitive implementations and runtime enforcement live in ocean-os.
primitive_native_builds = 0
runtime_enforced_in_this_repo = false

status_vocab = ["filesystem_convention", "transitional_harness", "proposed"]

[[build]]
id = "A1"
name = "typed-package-manifests"
status = "filesystem_convention"
primitive_native = false
owns = ["couriers/*/courier.toml", "assistants/*/*.toml"]
acceptance = [
  "Every assistant and courier declares class, mode, surface or route bindings, cwd, profile path, tool grants, and workflow-contract hooks.",
  "The Rust runtime can parse the manifests without Python discovery.",
]
depends_on = []
runtime_reads = ["AgentManifest", "CourierManifest"]

[[build]]
id = "A2"
name = "surface-profile-catalog"
status = "filesystem_convention"
primitive_native = false
owns = [
  "assistants/_shared/",
  "assistants/_base/<SURFACE>/",
  "assistants/<SURFACE>/system.md",
]
acceptance = [
  "Every authored surface has source files plus a non-empty generated profile.",
  "make assistants-check proves generated profiles have no drift.",
  "New surfaces are added as data, not daemon rebuilds.",
]
depends_on = []
verification = ["make assistants-check"]

[[build]]
id = "A3"
name = "named-assistant-packages"
status = "filesystem_convention"
primitive_native = false
owns = ["assistants/bonzai/", "assistants/content-agent/"]
acceptance = [
  "bonzai remains a complete git-hygiene specialist.",
  "content-agent graduates from scaffold to live Slack assistant with generate, status, gallery, and canvas flows grounded in its manifest, tools, and SOPs.",
]
depends_on = ["A1", "A2", "A6"]

[[build]]
id = "A4"
name = "courier-package-catalog"
status = "filesystem_convention"
primitive_native = false
owns = ["couriers/<courier>/courier.toml", "couriers/<courier>/CLAUDE.md", "couriers/<courier>/AGENTS.md"]
acceptance = [
  "file-courier stays the reference package.",
  "Each new courier is a folder with a manifest, destination-confirmation rules, an input/output contract, and no router edit.",
]
depends_on = ["A1"]

[[build]]
id = "A5"
name = "slack-bridge-validation-pack"
status = "transitional_harness"
primitive_native = false
owns = ["assistants/bridge/", "couriers/transport/slack.py"]
acceptance = [
  "The current Python bridge remains the live parity harness while ocean-slack lands.",
  "Inbound mention or DM reaches a daemon turn and replies in-thread.",
  "Canvas-op fulfillment passes once the daemon emits the SlackCanvas SSE event.",
  "The Python bridge is retired only after the Rust path passes the same tests live.",
]
depends_on = ["A1", "A2"]
verification = ["python3 -m unittest discover -s assistants/bridge/tests -v"]
retired_by = "ocean-slack"

[[build]]
id = "A6"
name = "tool-sop-skill-declarations"
status = "filesystem_convention"
primitive_native = false
owns = ["assistants/*/tools.toml", "assistants/*/sops/", "skills/<name>/"]
acceptance = [
  "Tool grants and SOPs are explicit filesystem data.",
  "Reusable SOPs become typed skills with trigger semantics, declared inputs, and provenance once the Skill schema lands.",
]
depends_on = ["A1"]
runtime_reads = ["Skill", "ToolGrant"]

[[build]]
id = "A7"
name = "memory-mount-declarations"
status = "proposed"
primitive_native = false
owns = ["future manifest stanzas"]
acceptance = [
  "Agent packages declare expected memory scopes: Agent, Operator, Shared.",
  "Agent packages declare allowed access modes: Infer or Query.",
  "Actual storage remains in ocean-memory, not this repo.",
]
depends_on = ["A1"]
runtime_reads = ["MemoryScope", "MemoryAccess"]

[[build]]
id = "A8"
name = "workflow-contract-fixtures"
status = "proposed"
primitive_native = false
owns = ["per-agent JSON Schema fixtures", "per-courier JSON Schema fixtures", "future manifest stanzas"]
acceptance = [
  "Workflow-invoked steps can call a courier or assistant through a typed Contract instead of a free prompt.",
  "Fixtures are testable without a live workflow run.",
]
depends_on = ["A1", "A3", "A4"]
runtime_reads = ["Contract"]

[[build]]
id = "A9"
name = "verification-gates"
status = "transitional_harness"
primitive_native = false
owns = ["Makefile", "assistants/bridge/tests/", "future manifest linter"]
acceptance = [
  "Existing checks stay green.",
  "A manifest/schema linter exists before Python discovery is deleted.",
]
depends_on = ["A1", "A2", "A5"]
verification = [
  "make assistants-check",
  "python3 -m unittest discover -s assistants/bridge/tests -v",
  "python3 couriers/hub/router.py list",
]

[[build]]
id = "A10"
name = "pure-content-cutover"
status = "proposed"
primitive_native = false
owns = ["docs/PYTHON_TO_RUST_MIGRATION.md deletion gates"]
acceptance = [
  "After verified Rust replacements are live, Python bridge, router, and harness code are removed.",
  "ocean-agents contains manifests, profiles, skills, SOPs, and test fixtures only.",
]
depends_on = ["A1", "A2", "A3", "A4", "A5", "A6", "A7", "A8", "A9"]
